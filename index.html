<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style/reset.css">
    <link rel="stylesheet" href="style/style.css">
    <script src="app.js" defer></script>
    <title>Lion School</title>
</head>

<body>

    <header>
        <img src="assents/logo.svg" alt="logo lion-school">
        <div class="sair">
            <img src="assents/Vector.svg" alt="botão de sair">
            <h1>Sair</h1>
        </div>

    </header>
    <main>
        <div class="slogan">
            <p>Escolha um <span>curso</span> para gerenciar</p>
            <img src="assents/devices.svg" alt="">
        </div>
        <div class="studend">
            <img src="assents/studant.svg" alt="">
        </div>
        <div class="botoes">
            <div class="DS">
                <button>
                    <img src="assents/ds.svg" alt="">
                    <p>DS</p>
                </button>
            </div>
            <div class="redes">
                <button>
                    <img src="assents/redes.svg" alt="">
                    <p>REDES</p>
                </button>
            </div>
        </div>
    </main>
    <footer>
        <div class="contatos">
            <div class="telefone">
                <img src="assents/phone.svg" alt="">
                <span>(11) 4774-4700</span>
            </div>
            <div class="email">
                <img src="assents/icon-email.svg" alt="">
                <span>lionschool@gmail.com</span>
            </div>
            <div class="local">
                <img src="assents/local.svg" alt="">
                <span>Rua tcc, 211, Centro, Jandira</span>
            </div>
        </div>
        <div class="copyright">
            <span>Copyright © 2026 | Fernando Leonid
            </span>
        </div>
        <div class="redes-sociais">
            <div class="borda">
                <img src="assents/youtube.svg" alt="">
            </div>
            <div class="borda">
                <img src="assents/twitter.svg" alt="">
            </div>
            <div class="borda">
                <img src="assents/instagram.svg" alt="">
            </div>
            <div class="borda">
                <img src="assents/facebook.svg" alt="">
            </div>
        </div>
    </footer>


</body>

</html>
